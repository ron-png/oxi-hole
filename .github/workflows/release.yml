name: Release

on:
  push:
    branches: [main]
    paths:
      - 'version.txt'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: oxi-dns

jobs:
  prepare:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      commit_sha: ${{ steps.push.outputs.commit_sha }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then
            VERSION=$(echo "$REF_NAME" | sed 's/^v//' | sed 's/---.*//')
          else
            VERSION=$(head -n1 version.txt | tr -d '[:space:]')
          fi

          # Check pre-release flag (line 2 of version.txt)
          PRERELEASE_LINE=$(sed -n '2p' version.txt 2>/dev/null || echo "")
          if [ "$PRERELEASE_LINE" = "--prerelease" ]; then
            IS_PRERELEASE=true
            TAG="v${VERSION}-dev"
          else
            IS_PRERELEASE=false
            TAG="v${VERSION}"
          fi

          NUMS=$(echo "$VERSION" | grep -oE '^[0-9]+(\.[0-9]+)*')
          IFS='.' read -r MAJOR MINOR PATCH _REST <<< "$NUMS"
          CARGO_VERSION="${MAJOR:-0}.${MINOR:-0}.${PATCH:-0}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "cargo_version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (Cargo: $CARGO_VERSION, Tag: $TAG, Pre-release: $IS_PRERELEASE)"

      - name: Update Cargo.toml version
        env:
          CARGO_VERSION: ${{ steps.version.outputs.cargo_version }}
        run: sed -i "s/^version = .*/version = \"$CARGO_VERSION\"/" Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - name: Commit version bump and create tag
        id: push
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "release: set version to $TAG" || echo "No changes to commit"
          git push
          git tag -fa "$TAG" -m "Release $TAG"
          git push origin "$TAG" --force
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: linux-amd64
            cross: true
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: linux-arm64
            cross: true
          # Linux ARMv7
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            archive: linux-armv7
            cross: true
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: darwin-amd64
          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: darwin-arm64
          # FreeBSD x86_64 (amd64 only — no arm64 build)
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            archive: freebsd-amd64
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}
        env:
          OXI_DNS_VERSION: ${{ needs.prepare.outputs.version }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}
        env:
          OXI_DNS_VERSION: ${{ needs.prepare.outputs.version }}
          AWS_LC_SYS_CMAKE_BUILDER: "1"

      - name: Package (Unix)
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "${{ github.workspace }}/${{ env.BINARY_NAME }}-${{ matrix.archive }}.tar.gz" ${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.archive }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.archive }}.tar.gz

  build-openbsd-amd64:
    name: Build openbsd-amd64
    needs: prepare
    runs-on: ubuntu-latest
    # Best-effort: OpenBSD is tier 3 in Rust. Built natively inside an OpenBSD VM.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Build inside OpenBSD VM
        uses: vmactions/openbsd-vm@v1
        with:
          release: "7.8"
          usesh: true
          envs: 'BINARY_NAME OXI_DNS_VERSION'
          prepare: |
            pkg_add -I rust
          run: |
            export OXI_DNS_VERSION="${{ needs.prepare.outputs.version }}"
            cargo build --release
            mkdir -p dist
            tar czf "dist/${BINARY_NAME}-openbsd-amd64.tar.gz" -C target/release "${BINARY_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-openbsd-amd64
          path: dist/${{ env.BINARY_NAME }}-openbsd-amd64.tar.gz
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ${{ env.BINARY_NAME }}-*

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec mv {} . \;
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attach-openbsd:
    name: Attach OpenBSD binary to release
    needs: [prepare, build-openbsd-amd64, release]
    if: needs.build-openbsd-amd64.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download OpenBSD artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-openbsd-amd64

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release upload "$TAG" "${{ env.BINARY_NAME }}-openbsd-amd64.tar.gz" --repo "${{ github.repository }}"

  container:
    name: Build Container Image
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Download linux-amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-amd64
          path: artifacts/amd64

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-linux-arm64
          path: artifacts/arm64

      - name: Extract binaries
        run: |
          mkdir -p bin/amd64 bin/arm64
          tar -xzf artifacts/amd64/${{ env.BINARY_NAME }}-linux-amd64.tar.gz -C bin/amd64
          tar -xzf artifacts/arm64/${{ env.BINARY_NAME }}-linux-arm64.tar.gz -C bin/arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_prerelease != 'true' }}
            type=raw,value=dev,enable=${{ needs.prepare.outputs.is_prerelease == 'true' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
