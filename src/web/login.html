<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Oxi-DNS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.12);
            --accent-glow: rgba(0, 212, 170, 0.25);
            --accent-hover: #00eabc;
            --warn: #e5a835;
            --error: #ef6461;
            --error-dim: rgba(239, 100, 97, 0.08);
            --text-1: #eaeaea;
            --text-2: #b0b4bc;
            --text-3: #6e7380;
            --surface-0: #0a0a0c;
            --surface-1: #101014;
            --surface-2: #1a1a22;
            --border: #252530;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        body {
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-2);
            background: var(--surface-0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0.3;
            pointer-events: none;
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.2; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.35; transform: translateX(-50%) scale(1.08); }
        }

        ::selection { background: var(--accent); color: var(--surface-0); }

        .card {
            width: 100%;
            max-width: 380px;
            padding: 44px 36px 40px;
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin: 24px;
            position: relative;
            box-shadow:
                0 0 0 1px rgba(0, 212, 170, 0.03),
                0 24px 48px -12px rgba(0, 0, 0, 0.5);
        }

        /* ---- Logo ---- */
        .logo {
            text-align: center;
            margin-bottom: 6px;
            font-family: var(--font-mono);
            font-size: 26px;
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--text-1);
        }

        .logo .oxi {
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .logo .sub {
            font-size: 14px;
            vertical-align: baseline;
            color: var(--text-3);
            font-weight: 400;
            margin-left: 1px;
        }

        .tagline {
            text-align: center;
            font-size: 13px;
            color: var(--text-3);
            margin-bottom: 36px;
            letter-spacing: 0.02em;
        }

        /* ---- Form ---- */
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-3);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--border);
            border-radius: 0;
            padding: 10px 0;
            font-size: 15px;
            font-family: var(--font-body);
            color: var(--text-1);
            outline: none;
            transition: border-color 0.25s ease;
        }

        .form-group input:focus {
            border-bottom-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-3);
            font-weight: 300;
        }

        /* Focus indicator line */
        .form-group .focus-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--accent);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .form-group input:focus ~ .focus-line {
            width: 100%;
        }

        /* ---- Submit Button ---- */
        .submit-btn {
            width: 100%;
            margin-top: 8px;
            padding: 13px 14px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-family: var(--font-mono);
            font-weight: 500;
            color: var(--surface-0);
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: 0 0 24px var(--accent-glow);
            transform: translateY(-1px);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        /* ---- Error ---- */
        .error-message {
            margin-top: 18px;
            padding: 11px 14px;
            background: var(--error-dim);
            border-left: 3px solid var(--error);
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: var(--error);
            display: none;
            animation: slideIn 0.2s ease;
        }

        .error-message.visible {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ---- Bottom flourish ---- */
        .card::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 24px;
            right: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><span class="oxi">oxi</span>-dns</div>
        <div class="tagline">Sign in to your dashboard</div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                    placeholder="admin"
                />
                <div class="focus-line"></div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                    placeholder="••••••••"
                />
                <div class="focus-line"></div>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
            <div class="error-message" id="error-message"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-message');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('visible');
        }

        function clearError() {
            errorMsg.textContent = '';
            errorMsg.classList.remove('visible');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please enter your username and password.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in\u2026';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    let msg = 'Invalid username or password.';
                    try {
                        const data = await res.json();
                        if (data && data.error) msg = data.error;
                    } catch (_) {}
                    showError(msg);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                }
            } catch (err) {
                showError('Unable to reach the server. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
